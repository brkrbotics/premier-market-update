name: Update market dashboard

# Runs when a new TRREB report PDF is uploaded to reports/, or on a manual click.
on:
  push:
    paths:
      - 'reports/**.pdf'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

concurrency:
  group: market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pdfplumber openpyxl

      - name: Run pipeline (extract -> append workbook -> regenerate dashboard)
        run: python pipeline.py

      - name: Commit & push results
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mw-historic-data.xlsx index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update dashboard (${GITHUB_SHA::7})"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with GITHUB_TOKEN does NOT trigger the Pages build (GitHub
      # anti-recursion safeguard), so the freshly-committed dashboard would never
      # go live. Explicitly request a Pages rebuild of the just-pushed commit.
      - name: Trigger GitHub Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X POST "repos/${{ github.repository }}/pages/builds"
